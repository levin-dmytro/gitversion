stages:
  - build_and_tag
  - deploy

variables:
  GIT_DEPTH: 0 # GitVersion требует полную историю для вычисления версии

build_and_tag:
  stage: build_and_tag
  image: gittools/gitversion:6.0.2-debian.11-6.0
  when: manual # Ручной запуск, чтобы не срабатывало само при мердже
  script:
    - git fetch --tags --force
    - VERSION=$(/tools/dotnet-gitversion /output json /showvariable SemVer)
    - echo "Вычисленная версия $VERSION"
    - echo "Собираем докер образ с тегом $VERSION и пушим в регистри..."
    - echo "Создаем Git-тег $VERSION..."
    - |
      # В реальном пайплайне здесь будет:
      # git tag -a "$VERSION" -m "Release $VERSION [skip ci]"
      # git push origin "$VERSION"
      echo "Тег создан!"

deploy_by_tag:
  stage: deploy
  when: manual # Запускать вручную, указывая тег
  variables:
    TARGET_TAG:
      description: "Укажите тег для деплоя (например, 1.2.0)"
      value: ""
  script:
    - |
      if [ -z "$TARGET_TAG" ]; then
        echo "Ошибка: TARGET_TAG не указан!"
        exit 1
      fi
    - echo "Скачиваем артефакт/образ для тега $TARGET_TAG..."
    - echo "Деплоим версию $TARGET_TAG в Production..."
    - echo "Успех!"
