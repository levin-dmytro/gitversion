name: "1. Build and Tag"

on:
  workflow_dispatch: # Запуск только вручную (чтобы не спамить при тестировании)

jobs:
  versioning:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      semVer: ${{ steps.gitversion.outputs.semVer }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Обязательно для GitVersion, чтобы скачать всю историю и теги

      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v3.0.0
        with:
          versionSpec: '6.0.0' # Используем версию 6.x

      - name: Execute GitVersion
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3.0.0
        with:
          useConfigFile: true
          configFilePath: 'GitVersion.yml'

      - name: Display Computed Version
        run: |
          echo "Semantic Version: ${{ steps.gitversion.outputs.semVer }}"
          
  build-and-tag:
    name: Build & Create Tag
    runs-on: ubuntu-latest
    needs: versioning
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Build and Push Docker Image
        run: |
          echo "Building image with tag ${{ needs.versioning.outputs.semVer }}"
          echo "Pushing image to ECR..."
          
      - name: Create and Push Git Tag
        run: |
          VERSION=${{ needs.versioning.outputs.semVer }}
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release $VERSION [skip ci]"
          git push origin "$VERSION"
